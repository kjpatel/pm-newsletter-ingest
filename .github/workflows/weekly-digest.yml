name: Weekly PM Digest

on:
  schedule:
    # Saturday 2pm UTC = Saturday 9am ET
    - cron: '0 14 * * 6'
  workflow_dispatch: # Allow manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest first to ensure notes are up to date
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python ingest_cloud.py

      - name: Run cloud digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python digest_cloud.py

      - name: Commit notes and digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/ seen_*.json
          if git diff --cached --quiet; then
            echo "No new content to commit"
          else
            git commit -m "digest: $(date -u +%Y-%m-%d) weekly ingest + digest"
            git push
          fi
